<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="김민수의 포트폴리오 연락처. 직접적인 문의 및 채용 제안을 받습니다.">
    <meta name="keywords" content="SK하이닉스, 김민수, 연락처, Contact, 유지보수 엔지니어">
    <meta name="author" content="Kim Min-su">
    <title>Contact | 김민수 SK하이닉스 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--bg-light);">

    <nav>
        <a href="index.html" class="logo">Minsu.KIM</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="class.html">Class & History</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="nav-active">Contact</a></li>
            <li><a href="board.html">Board</a></li>
        </ul>
    </nav>

    <div class="board-container">
        <header style="text-align: center; margin-bottom: 4rem;" class="reveal">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Direct Contact</h1>
            <p style="color: #6e6e73; font-size: 1.1rem;">포트폴리오를 둘러보시고 궁금한 점이나 비즈니스 문의를 남겨주세요.</p>
        </header>

        <section class="post-form reveal" style="max-width: 600px; margin: 0 auto;">
            <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">문의하기</h2>
            <form id="contactForm" action="https://formspree.io/f/mvzdpnoz" method="POST">
                <!-- Replace 'xyzkpvvo' with your actual Formspree ID if you have one, 
                     otherwise Formspree will ask you to confirm your email upon first submission -->
                <div class="form-group">
                    <label for="author">성함 / 소속</label>
                    <input type="text" name="name" id="author" placeholder="예: 홍길동 (SK하이닉스 인사팀)" required>
                </div>
                <div class="form-group">
                    <label for="email">회신 받을 이메일 주소</label>
                    <input type="email" name="_replyto" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="content">문의 내용</label>
                    <textarea name="message" id="content" rows="5" placeholder="질문이나 채용 제안 등을 자유롭게 작성해주세요." required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">메일 보내기</button>
                <div id="status" style="margin-top: 1rem; text-align: center; font-size: 0.9rem; font-weight: 600;"></div>
            </form>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1.5rem; text-align: center; line-height: 1.6;">
                * 전송 버튼 클릭 시 입력하신 내용이 김민수 엔지니어의 메일함으로 즉시 전달됩니다.<br>
                <strong>Email:</strong> minsukim0381@gmail.com | <strong>Phone:</strong> 010-7544-0381
            </p>
        </section>
    </div>

    <footer>
        <p class="footer-text">© 2026 Kim Min-su. SK Hynix Maintenance Engineer Portfolio.</p>
    </footer>

    <script>
        const contactForm = document.getElementById('contactForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        contactForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "전송 중...";
            status.innerHTML = "";

            const data = new FormData(contactForm);
            
            try {
                // Using provided Form ID for reliable routing
                const response = await fetch("https://formspree.io/f/mvzdpnoz", {
                    method: 'POST',
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    status.innerHTML = "<span style='color: #28a745;'>성공적으로 전송되었습니다! 곧 회신 드리겠습니다.</span>";
                    contactForm.reset();
                } else {
                    const errorData = await response.json();
                    status.innerHTML = `<span style='color: #dc3545;'>오류가 발생했습니다: ${errorData.errors ? errorData.errors.map(e => e.message).join(', ') : '알 수 없는 오류'}</span>`;
                }
            } catch (error) {
                status.innerHTML = "<span style='color: #dc3545;'>서버와의 통신 중 오류가 발생했습니다.</span>";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "메일 보내기";
            }
        });

        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;
    </script>
</body>
</html>
